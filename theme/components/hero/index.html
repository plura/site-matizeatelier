<section class="hero" aria-label="Hero">

	<video
		class="hero__video"
		autoplay
		loop
		muted
		playsinline
		disablepictureinpicture
		aria-hidden="true"
	>
		<source src="https://matizeatelier.pt/wp/wp-content/uploads/2026/04/mtz-hero-20260411.webm" type="video/webm">
	</video>

<div class="hero__content">
		<div class="hero__logo" aria-hidden="true">
			<img src="assets/media/mtz-logo.svg" class="hero__logo-svg" alt="Matize Atelier" />
		</div>
		<a href="#main" class="hero__scroll" aria-label="Scroll to content">
			<i data-lucide="chevron-down"></i>
		</a>
	</div>

</section>
