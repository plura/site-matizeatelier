<!DOCTYPE html>
<html lang="pt">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>%FORM_NAME%</title>
	<style type="text/css">
		body {
			margin: 0;
			padding: 0;
			background-color: #F5F0EA;
			font-family: Georgia, serif;
			color: #2A2420;
		}

		table {
			border-spacing: 0;
			width: 100%;
		}

		.email-container {
			max-width: 560px;
			margin: 0 auto;
			padding: 40px 16px;
		}

		/* ── Header ── */
		.email-header {
			background-color: #2A2420;
			padding: 32px 40px;
		}

		.email-brand {
			color: #F5F0EA;
			font-family: Georgia, serif;
			font-size: 16px;
			font-weight: normal;
			letter-spacing: 0.2em;
			text-decoration: none;
			text-transform: uppercase;
		}

		/* ── Body ── */
		.email-body {
			background-color: #ffffff;
			padding: 32px 40px 8px;
		}

		.email-form-name {
			color: #9E948A;
			font-family: Arial, sans-serif;
			font-size: 11px;
			letter-spacing: 0.15em;
			padding-bottom: 16px;
			text-transform: uppercase;
		}

		/* ── Fields ── */
		.form-data {
			width: 100%;
			border-collapse: collapse;
		}

		.form-data td {
			background-color: #ffffff;
			border-bottom: 1px solid #F5F0EA;
			font-size: 14px;
			padding: 12px 40px 12px 0;
			text-align: left;
			vertical-align: top;
		}

		.form-data .label-cell {
			color: #9E948A;
			font-family: Arial, sans-serif;
			font-size: 11px;
			letter-spacing: 0.08em;
			padding-right: 24px;
			text-transform: uppercase;
			white-space: nowrap;
			width: 30%;
		}

		.form-data .value-cell {
			color: #2A2420;
			font-family: Georgia, serif;
			font-size: 14px;
			line-height: 1.6;
		}

		/* ── Footer ── */
		.email-footer {
			background-color: #ffffff;
			border-top: 1px solid #F5F0EA;
			color: #9E948A;
			font-family: Arial, sans-serif;
			font-size: 11px;
			letter-spacing: 0.08em;
			padding: 24px 40px;
		}

		.email-footer a {
			color: #9E948A;
			text-decoration: none;
		}

		/* ── Developer credit ── */
		.email-developer {
			color: #9E948A;
			font-family: Arial, sans-serif;
			font-size: 10px;
			padding: 16px 40px;
			text-align: center;
		}

		.email-developer a {
			color: #9E948A;
			text-decoration: none;
		}

		/* ── Responsive ── */
		@media screen and (max-width: 480px) {
			.email-header,
			.email-body,
			.email-footer,
			.email-developer { padding-left: 24px; padding-right: 24px; }

			.form-data td { display: block; width: 100%; }
			.form-data .label-cell { padding-bottom: 0; border-bottom: none; white-space: normal; }
		}
	</style>
</head>
<body>
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" bgcolor="#F5F0EA">
	<tr>
		<td align="center">
			<div class="email-container">

				<!-- Brand -->
				<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
					<tr>
						<td class="email-header">
							<a href="%SITE_URL%" class="email-brand">%SITE_NAME%</a>
						</td>
					</tr>
				</table>

				<!-- Form name -->
				<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
					<tr>
						<td class="email-body">
							<p class="email-form-name">%FORM_NAME%</p>
						</td>
					</tr>
				</table>

				<!-- Fields -->
				<table class="form-data" role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
					%FIELDS%
				</table>

				<!-- Footer -->
				<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
					<tr>
						<td class="email-footer">
							%SITE_NAME% &mdash; <a href="%SITE_URL%">%SITE_URL%</a>
						</td>
					</tr>
					<tr>
						<td class="email-developer">
							powered by <a href="https://plura.pt" target="_blank">Plura&trade;</a>
						</td>
					</tr>
				</table>

			</div>
		</td>
	</tr>
</table>
</body>
</html>
